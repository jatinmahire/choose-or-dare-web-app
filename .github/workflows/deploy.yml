name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

# TODO: Add full deploy workflow in a later phase.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
