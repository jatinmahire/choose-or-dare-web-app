name: Deploy Worker to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'

# TODO: Add full worker deploy workflow in a later phase.
jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
